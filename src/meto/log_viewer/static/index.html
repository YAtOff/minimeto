<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meto Log Viewer</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>📋 Meto Log Viewer</h1>
    </header>
    <main>
        <aside id="sidebar">
            <h2>Log Files</h2>
            <div id="log-list">Loading...</div>
        </aside>
        <section id="content">
            <div id="search-container" class="hidden">
                <input type="text" id="search-input" placeholder="Search log entries...">
                <label class="error-filter">
                    <input type="checkbox" id="error-only">
                    <span class="error-icon">⚠️</span> Errors only
                </label>
                <span id="search-count"></span>
            </div>
            <div id="log-content">Select a log file to view</div>
        </section>
    </main>
    <script src="/app.js"></script>
</body>
</html>
