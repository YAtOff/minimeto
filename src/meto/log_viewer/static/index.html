<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meto Log Viewer</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Meto Log Viewer</h1>
        </header>
        <main>
            <div class="log-selector">
                <label for="log-file">Select Log File:</label>
                <select id="log-file">
                    <option value="">-- Select a log file --</option>
                </select>
                <button id="refresh-btn">Refresh</button>
            </div>
            <div class="search-container" id="search-container" style="display: none;">
                <div class="search-input-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input 
                        type="text" 
                        id="search-input" 
                        class="search-input" 
                        placeholder="Search entries..."
                        aria-label="Search log entries"
                        autocomplete="off"
                    >
                    <button id="search-clear-btn" class="search-clear-btn" title="Clear search" aria-label="Clear search">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="search-info">
                    <span id="search-count" class="search-count" aria-live="polite"></span>
                </div>
            </div>
            <div id="log-content">
                <p class="placeholder">Select a log file to view its contents.</p>
            </div>
        </main>
    </div>
    <script src="/app.js"></script>
</body>
</html>
